# https://taskfile.dev

version: "3"

dotenv: [".env"]

vars:
  SSH: ssh $REMOTE_ROOT@$SSH_IP_ADDRESS -p $SSH_PORT
  SCP: scp -P $SSH_PORT -r

tasks:
  setup:
    desc: Full instance setup (apt, clone, aws, taskfile)
    cmds:
      - task: apt
      - task: clone
      - task: aws
      - task: task

  ssh:
    desc: SSH into the remote instance
    cmds:
      - "{{.SSH}}"

  ssh:add:
    desc: Add the remote SSH key to the agent
    cmds:
      - ssh-add $REMOTE_SSH_KEY

  scp:
    desc: "Upload a file to $REMOTE_HOME -- Example: scp -- file.txt"
    cmds:
      - "{{.SCP}} {{.CLI_ARGS}} $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/"

  scp:down:
    desc: "Download a file from $REMOTE_HOME -- Example: scp:down -- file.txt"
    cmds:
      - "{{.SCP}} $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/{{.CLI_ARGS}} ."

  clone:
    desc: Copy SSH key and git config, then clone GIT_URI
    cmds:
      - "{{.SCP}} $GIT_SSH_KEY $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/.ssh/id_rsa"
      - "{{.SCP}} ~/.gitconfig $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/.gitconfig"
      - '{{.SSH}} "ssh-keyscan github.com >> ~/.ssh/known_hosts"'
      - '{{.SSH}} "git clone $GIT_URI"'

  task:
    desc: Install Taskfile CLI and deploy REMOTE_TASK_FILE
    cmds:
      - '{{.SSH}} ''sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin'''
      - task: task:file

  task:file:
    desc: Deploy REMOTE_TASK_FILE to ~/Taskfile.yaml on the remote
    cmds:
      - "{{.SCP}} $REMOTE_TASK_FILE $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/Taskfile.yaml"

  apt:
    desc: Run apt update and install common tools
    cmds:
      - "{{.SSH}} 'apt update'"
      - "{{.SSH}} 'apt install git tmux nvtop unzip -y'"

  aws:
    desc: Install AWS CLI v2 and copy credentials
    cmds:
      - '{{.SSH}} ''apt-get install -y curl unzip && curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip" && unzip -q awscliv2.zip && ./aws/install && rm -rf awscliv2.zip aws'''
      - task: aws:config

  aws:config:
    desc: Copy ~/.aws credentials to the remote
    cmds:
      - "{{.SCP}} ~/.aws $REMOTE_ROOT@$SSH_IP_ADDRESS:$REMOTE_HOME/.aws"

  tunnel:
    desc: "Forward SSH_TUNNEL_PORT to localhost -- Example: SSH_TUNNEL_PORT=8888 task tunnel"
    cmds:
      - ssh -NL $SSH_TUNNEL_PORT:localhost:$SSH_TUNNEL_PORT $REMOTE_ROOT@$SSH_IP_ADDRESS -p $SSH_PORT
