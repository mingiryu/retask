# https://taskfile.dev
# Used for setting up Ubuntu

version: "3"

tasks:
  docker:
    desc: Install Docker
    cmds:
      - sudo apt-get install -y docker.io
      - sudo service docker start
      - sudo usermod -aG docker $USER
      - newgrp docker

  mount:
    desc: |
      Mount a NVME disk
      Example: mount DISK=nvme1n1 TAG=data
    vars:
      DISK: '{{.DISK| default "nvme1n1"}}'
      TAG: '{{.TAG| default "data"}}'
    cmds:
      - sudo mkfs -t xfs /dev/{{.DISK}}
      - sudo mkdir /{{.TAG}}
      - sudo mount /dev/{{.DISK}} /{{.TAG}}

  tools:
    desc: Update and install tools
    cmds:
      - sudo apt-get install -y git vim htop tmux iotop
